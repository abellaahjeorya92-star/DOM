<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Neon Mood Switch</title>

    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: 0.4s;
        }

        /* Title */
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #fff, 0 0 20px #0ff;
        }

        /* Buttons container */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        /* Neon Button */
        button {
            padding: 12px 25px;
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* Glow effect */
        button:hover {
            box-shadow: 0 0 10px #fff, 0 0 20px currentColor;
            transform: scale(1.1);
        }

        /* Color Variants */
        .green {
            color: #00ff9f;
            border-color: #00ff9f;
        }

        .purple {
            color: #c77dff;
            border-color: #c77dff;
        }

        .blue {
            color: #00bbf9;
            border-color: #00bbf9;
        }

        .red {
            color: #ff4d6d;
            border-color: #ff4d6d;
        }

        .yellow {
            color: #ffd60a;
            border-color: #ffd60a;
        }
    </style>
</head>

<body>

    <h1>⚡ Neon Mood ⚡</h1>

    <div class="button-container">
        <button class="green" data-bg="#001f1a" data-text="#00ff9f">Green</button>
        <button class="purple" data-bg="#1a0033" data-text="#c77dff">Purple</button>
        <button class="blue" data-bg="#001d3d" data-text="#00bbf9">Blue</button>
        <button class="red" data-bg="#2b0000" data-text="#ff4d6d">Red</button>
        <button class="yellow" data-bg="#332b00" data-text="#ffd60a">Yellow</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const buttons = document.querySelectorAll("button");

            const savedBg = localStorage.getItem("bg");
            const savedText = localStorage.getItem("text");

            if (savedBg && savedText) {
                document.documentElement.style.setProperty("--bg-color", savedBg);
                document.documentElement.style.setProperty("--text-color", savedText);
            }

            buttons.forEach(btn => {
                btn.addEventListener("click", () => {

                    const bg = btn.dataset.bg;
                    const text = btn.dataset.text;

                    document.documentElement.style.setProperty("--bg-color", bg);
                    document.documentElement.style.setProperty("--text-color", text);

                    localStorage.setItem("bg", bg);
                    localStorage.setItem("text", text);

                });
            });

        });
    </script>

</body>

</html>
